<!doctype html>
<!-- SPDX-License-Identifier: AGPL-3.0-or-later -->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XTC 変換 for Xteink X3</title>
    <meta
      name="description"
      content="URL を送るだけで Web ページを Xteink X3 で読める XTC ファイルに変換します。"
    />
    <!-- OGP / Twitter Card。SNS のクローラーは JS を実行しないため静的な head に置く。
         og:image は絶対 URL でなければ解決されないので本番オリジンを直書きする。 -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="XTC 変換 for Xteink X3" />
    <meta property="og:title" content="XTC 変換 for Xteink X3" />
    <meta
      property="og:description"
      content="URL を送るだけで Web ページを Xteink X3 で読める XTC ファイルに変換します。"
    />
    <meta property="og:url" content="https://xtc.hr20k.com/" />
    <meta property="og:image" content="https://xtc.hr20k.com/ogp-image.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="670" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- TextOptions のフォント選択候補（frontend/src/lib/text-options.ts の FONT_CANDIDATES）を
         カスタムドロップダウン内で各書体自身のグリフでプレビュー表示するためのロード。
         BIZ UD 4書体（UDGothic / UDPGothic / UDMincho / UDPMincho）は 400;700 が実在する
         のでそのまま指定、他4書体は 400 のみ実在するためウェイト指定なし。 -->
    <link
      href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDMincho:wght@400;700&family=BIZ+UDPMincho:wght@400;700&family=Noto+Sans+JP&family=Noto+Serif+JP&family=Zen+Maru+Gothic&family=Shippori+Mincho&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <!-- Cloudflare Turnstile 公式スクリプト（登録モード仕様 Phase2 §5.2 (4)）。
         defer で読み込み、実際のウィジェット描画は
         frontend/src/components/PasskeyRegistrationDialog.svelte が
         publicConfig.turnstileSiteKey 設定時のみ window.turnstile を使って
         明示的に行う（本番の invite/closed 環境ではこのスクリプトが読み込ま
         れても turnstile.render() は一度も呼ばれない）。 -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
