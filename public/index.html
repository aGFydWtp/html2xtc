<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>URL → XTC 変換</title>
<style>
  :root {
    --bg: #f6f6f4;
    --card: #ffffff;
    --text: #1c1c1a;
    --muted: #6b6b66;
    --line: #e2e2de;
    --accent: #0a6e5c;
    --accent-text: #ffffff;
    --error: #b3392f;
    --ok: #0a6e5c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161815;
      --card: #1f221e;
      --text: #ecece8;
      --muted: #9a9a93;
      --line: #33362f;
      --accent: #4cc2a9;
      --accent-text: #10241f;
      --error: #e07a70;
      --ok: #4cc2a9;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 40rem;
    margin: 0 auto;
    padding: 1.25rem 1rem 3rem;
  }
  h1 {
    font-size: 1.15rem;
    margin: 0.25rem 0 0.25rem;
    letter-spacing: 0.02em;
  }
  .sub { color: var(--muted); font-size: 0.8rem; margin: 0 0 1.25rem; }
  form {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  input[type="url"] {
    width: 100%;
    padding: 0.75rem 0.85rem;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
  }
  input[type="url"]:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
  button.primary {
    padding: 0.8rem;
    font-size: 1rem;
    font-weight: 600;
    border: 0;
    border-radius: 10px;
    background: var(--accent);
    color: var(--accent-text);
    cursor: pointer;
  }
  button.primary:disabled { opacity: 0.55; cursor: default; }
  #current {
    margin-top: 1rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    display: none;
  }
  #current.show { display: block; }
  .url-line {
    font-size: 0.8rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .title-line {
    font-size: 0.9rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .title-line + .url-line { font-size: 0.72rem; }
  .status-line { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.35rem; }
  .badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--muted);
    white-space: nowrap;
  }
  .badge.active { color: var(--accent); border-color: var(--accent); }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.err { color: var(--error); border-color: var(--error); }
  .spinner {
    width: 0.85rem; height: 0.85rem;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    flex: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-text { color: var(--error); font-size: 0.85rem; margin-top: 0.35rem; word-break: break-all; }
  a.dl {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.55rem 1rem;
    border-radius: 10px;
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
  }
  section.history { margin-top: 2rem; }
  .history-head { display: flex; align-items: baseline; justify-content: space-between; }
  .history-head h2 { font-size: 0.95rem; margin: 0; }
  .history-head button {
    border: 0; background: none; color: var(--muted);
    font-size: 0.75rem; cursor: pointer; text-decoration: underline;
    /* >=44px tap target without inflating the layout */
    padding: 0.85rem 0.25rem; margin: -0.85rem -0.25rem;
  }
  .note { color: var(--muted); font-size: 0.72rem; margin: 0.25rem 0 0.75rem; }
  ul.jobs { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.5rem; }
  ul.jobs li {
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--card);
  }
  .meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; }
  .date { color: var(--muted); font-size: 0.72rem; }
  a.dl-small {
    color: var(--accent); font-size: 0.8rem; font-weight: 600; text-decoration: none;
    /* >=44px tap target without inflating the row */
    padding: 0.85rem 0.5rem; margin: -0.85rem -0.5rem -0.85rem auto;
  }
  .empty { color: var(--muted); font-size: 0.85rem; }
  footer.about { margin-top: 2.5rem; text-align: center; }
  footer.about a { color: var(--muted); font-size: 0.75rem; }
</style>
</head>
<body>
<main>
  <h1>URL → XTC 変換</h1>
  <p class="sub">記事 URL を送ると Xteink X3 用の XTC ファイルを生成します。</p>

  <form id="form">
    <input id="url" type="url" required placeholder="https://example.com/article"
           inputmode="url" autocomplete="off" spellcheck="false">
    <button id="submit" class="primary" type="submit">変換を開始</button>
  </form>

  <div id="current"></div>

  <section class="history">
    <div class="history-head">
      <h2>履歴</h2>
      <button id="clear" type="button">履歴を全削除</button>
    </div>
    <p class="note">ファイルはサーバー上に約 24 時間保存され、その後は自動削除されてダウンロードできなくなります。</p>
    <ul id="jobs" class="jobs"></ul>
    <p id="empty" class="empty">まだ履歴はありません。</p>
  </section>

  <footer class="about">
    <a href="/about">このサービスについて（利用規約・連絡先）</a>
  </footer>
</main>

<script>
"use strict";
// --- localStorage history -------------------------------------------------
const STORE_KEY = "xtc-jobs";
const MAX_ENTRIES = 50;
const POLL_MS = 4000;

const LABELS = {
  queued: "待機中",
  rendering: "PDF 生成中",
  converting: "XTC 変換中",
  completed: "完了",
  failed: "失敗",
  expired: "期限切れ",
};
const IN_FLIGHT = ["queued", "rendering", "converting"];

function loadJobs() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) ?? "[]");
    if (!Array.isArray(raw)) return [];
    // Drop malformed entries so one bad record can't break the whole list.
    return raw.filter((j) => j && typeof j === "object"
      && typeof j.jobId === "string" && typeof j.url === "string"
      && typeof j.status === "string");
  } catch { return []; }
}
function saveJobs(jobs) {
  // Newest first; drop the oldest beyond the cap.
  localStorage.setItem(STORE_KEY, JSON.stringify(jobs.slice(0, MAX_ENTRIES)));
}
function upsertJob(entry) {
  const jobs = loadJobs();
  const i = jobs.findIndex((j) => j.jobId === entry.jobId);
  if (i === -1) jobs.unshift(entry);
  else jobs[i] = { ...jobs[i], ...entry };
  saveJobs(jobs);
  renderHistory();
}

// --- rendering ------------------------------------------------------------
const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"']/g, (c) => (
  { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
));

function badge(status) {
  const cls = status === "completed" ? "ok"
    : status === "failed" || status === "expired" ? "err"
    : "active";
  const label = Object.hasOwn(LABELS, status)
    ? LABELS[status]
    : esc(String(status));
  return `<span class="badge ${cls}">${label}</span>`;
}

// The page title (once known) becomes the display name; the URL stays
// visible underneath so entries remain distinguishable.
function jobTitle(j) {
  return typeof j.title === "string" && j.title ? j.title : "";
}
function nameLines(j) {
  const title = jobTitle(j);
  return (title ? `<div class="title-line">${esc(title)}</div>` : "")
    + `<div class="url-line">${esc(j.url)}</div>`;
}

function renderCurrent(job, note) {
  const el = $("current");
  if (!job) { el.className = ""; return; }
  const busy = !note && IN_FLIGHT.includes(job.status);
  el.className = "show";
  el.innerHTML = `
    ${nameLines(job)}
    <div class="status-line">
      ${busy ? '<span class="spinner"></span>' : ""}
      ${badge(job.status)}
    </div>
    ${note ? `<div class="error-text">${esc(note)}</div>` : ""}
    ${job.status === "failed" && job.error ? `<div class="error-text">${esc(job.error)}</div>` : ""}
    ${job.status === "completed" ? `<a class="dl" href="/jobs/${encodeURIComponent(job.jobId)}/download">XTC をダウンロード</a>` : ""}
  `;
}

const EXPIRY_MS = 24 * 60 * 60 * 1000;

// Completed entries older than the server-side R2 retention are shown as
// expired instead of offering a download that would 404.
function effectiveStatus(j) {
  if (j.status === "completed") {
    const t = Date.parse(j.createdAt);
    if (!Number.isNaN(t) && Date.now() - t > EXPIRY_MS) return "expired";
  }
  return j.status;
}

function renderHistory() {
  const jobs = loadJobs();
  $("empty").style.display = jobs.length ? "none" : "";
  $("jobs").innerHTML = jobs.map((j) => {
    const status = effectiveStatus(j);
    return `
    <li>
      ${nameLines(j)}
      <div class="meta">
        ${badge(status)}
        <span class="date">${esc(formatDate(typeof j.createdAt === "string" ? j.createdAt : ""))}</span>
        ${status === "completed"
          ? `<a class="dl-small" data-job-id="${esc(j.jobId)}" href="/jobs/${encodeURIComponent(j.jobId)}/download">ダウンロード</a>`
          : ""}
      </div>
    </li>`;
  }).join("");
}

function formatDate(iso) {
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return "";
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

// --- job submission and polling -------------------------------------------
const MAX_POLL_FAILURES = 5;
const SESSION_MSG = "セッションが切れました。ページを再読み込みしてください。";
const POLL_FAIL_MSG = "状態の取得に失敗しました。ページを再読み込みしてください。";

let pollTimer = null;
let pollGen = 0;      // generation token: bumping it cancels older poll loops
let pollFailures = 0; // consecutive failures of the active loop
let poll404s = 0;     // consecutive 404s of the active loop
let activeJob = null; // job tracked by the continuous poller

// An expired Access session redirects API fetches to the team login page.
function sessionExpired(res) {
  return res.redirected && res.url.includes("cloudflareaccess.com");
}

function startPolling(job) {
  clearTimeout(pollTimer);
  pollGen += 1;
  pollFailures = 0;
  poll404s = 0;
  activeJob = job;
  renderCurrent(job);
  poll(job, pollGen);
}

async function submit(event) {
  event.preventDefault();
  const url = $("url").value.trim();
  if (!url) return;
  const button = $("submit");
  button.disabled = true;
  try {
    const res = await fetch("/jobs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    if (sessionExpired(res)) {
      renderCurrent({ url, jobId: "", status: "failed" }, SESSION_MSG);
      return;
    }
    const body = await res.json().catch(() => null);
    if (!res.ok || !body) {
      renderCurrent({
        url, jobId: "", status: "failed",
        error: (body && body.error) || `エラー (HTTP ${res.status})`,
      });
      return;
    }
    startPolling({ jobId: body.jobId, url, createdAt: new Date().toISOString(), status: "queued" });
    upsertJob(activeJob);
  } catch {
    renderCurrent({ url, jobId: "", status: "failed", error: "サーバーに接続できません。" });
  } finally {
    button.disabled = false;
  }
}

async function poll(job, gen) {
  if (gen !== pollGen) return; // a newer loop took over
  try {
    const res = await fetch(`/jobs/${encodeURIComponent(job.jobId)}`);
    if (gen !== pollGen) return;
    if (sessionExpired(res)) {
      renderCurrent(job, SESSION_MSG);
      return;
    }
    if (res.status === 404) {
      // 404 は真の不在・一過性エラー・照会前の初回ポールを区別できない。
      // 猶予回数を使い切ったときだけ expired 終端にし、それまでは IN_FLIGHT を
      // 維持したまま末尾の再スケジュールへフォールスルーして次回ポールを続ける。
      if (++poll404s >= MAX_POLL_FAILURES) {
        job.status = "expired";
        upsertJob(job); renderCurrent(job);
        return;
      }
    } else if (res.ok) {
      let body;
      try {
        body = await res.json();
      } catch {
        // HTML (e.g. an Access login page) instead of JSON: not recoverable
        // by retrying.
        renderCurrent(job, SESSION_MSG);
        return;
      }
      pollFailures = 0;
      poll404s = 0;
      job.status = body.status;
      if (typeof body.title === "string" && body.title) job.title = body.title;
      if (body.error) job.error = body.error;
      upsertJob(job);
      renderCurrent(job);
      if (!IN_FLIGHT.includes(job.status)) return; // completed / failed: stop
    } else if (++pollFailures >= MAX_POLL_FAILURES) {
      renderCurrent(job, POLL_FAIL_MSG);
      return;
    }
  } catch {
    // Network hiccup: retry, but give up after repeated failures.
    if (gen !== pollGen) return;
    if (++pollFailures >= MAX_POLL_FAILURES) {
      renderCurrent(job, POLL_FAIL_MSG);
      return;
    }
  }
  if (document.hidden) return; // paused; visibilitychange resumes
  pollTimer = setTimeout(() => poll(job, gen), POLL_MS);
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// Refresh statuses of jobs that were still running when the page was last
// closed (one shot per job; the newest one resumes continuous polling).
async function refreshStale() {
  const stale = loadJobs().filter((j) => IN_FLIGHT.includes(j.status));
  for (const [i, job] of stale.entries()) {
    if (i === 0) { startPolling(job); continue; }
    // 404 は一過性でもあり得るため、poll と同じ猶予概念で連続404を数え、
    // 全試行が 404 のときだけ expired に落とす（非404は下で break する）。
    for (let attempt = 0; attempt < MAX_POLL_FAILURES; attempt++) {
      if (attempt > 0) await sleep(POLL_MS);
      try {
        const res = await fetch(`/jobs/${encodeURIComponent(job.jobId)}`);
        if (res.status === 404) {
          if (attempt === MAX_POLL_FAILURES - 1) { job.status = "expired"; upsertJob(job); }
          continue; // 猶予内: 次の試行へ
        }
        if (res.ok && !sessionExpired(res)) {
          const body = await res.json().catch(() => null);
          if (body) {
            job.status = body.status;
            if (typeof body.title === "string" && body.title) job.title = body.title;
            if (body.error) job.error = body.error;
            upsertJob(job);
          }
        }
        break; // res.ok / session 切れ等は打ち切り
      } catch { /* leave as-is */ break; }
    }
  }
}

// Pause polling while the tab is hidden; resume (with a fresh generation,
// so any straggling fetch from before the pause is ignored) when visible.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible") {
    clearTimeout(pollTimer);
    return;
  }
  if (activeJob && IN_FLIGHT.includes(activeJob.status)) {
    pollGen += 1;
    pollFailures = 0;
    poll404s = 0;
    poll(activeJob, pollGen);
  }
});

// History downloads: confirm the job still exists before navigating, so an
// expired artifact flips the entry to "expired" instead of showing raw 404 JSON.
$("jobs").addEventListener("click", async (event) => {
  const link = event.target.closest("a.dl-small");
  if (!link) return;
  event.preventDefault();
  const jobId = link.dataset.jobId;
  try {
    const res = await fetch(`/jobs/${encodeURIComponent(jobId)}`);
    if (res.status === 404) {
      const jobs = loadJobs();
      const j = jobs.find((x) => x.jobId === jobId);
      if (j) { j.status = "expired"; saveJobs(jobs); renderHistory(); }
      return;
    }
  } catch { /* fall through and attempt the download anyway */ }
  window.location.href = link.href;
});

$("form").addEventListener("submit", submit);
$("clear").addEventListener("click", () => {
  if (confirm("履歴をすべて削除しますか？（サーバー上のファイルは削除されません）")) {
    localStorage.removeItem(STORE_KEY);
    renderHistory();
  }
});
renderHistory();
refreshStale();
</script>
</body>
</html>
